spring.datasource.url=jdbc:postgresql://localhost:5432/persons_finder
spring.datasource.username=persons_finder
spring.datasource.password=persons_finder
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Google Gemini (AI bio generation). Blank api-key disables generation.
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-3.1-flash-lite}
gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
