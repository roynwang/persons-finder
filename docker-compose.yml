services:
  db:
    image: postgres:16-alpine
    container_name: persons-finder-db
    environment:
      POSTGRES_DB: persons_finder
      POSTGRES_USER: persons_finder
      POSTGRES_PASSWORD: persons_finder
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persons_finder -d persons_finder"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: persons-finder-app
    ports:
      - "8080:8080"
    # Uncomment once the app has the PostgreSQL driver and JPA config for it
    # environment:
    #   SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/persons_finder
    #   SPRING_DATASOURCE_USERNAME: persons_finder
    #   SPRING_DATASOURCE_PASSWORD: persons_finder
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
